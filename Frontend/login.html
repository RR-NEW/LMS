<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Lead Management Software</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-body">
    <div class="login-card">
      <h2>Lead Management System</h2>
      <p>Sign in to manage your system pipeline</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter admin username"/>
        </div>

        <div class="form-group">
          <label for="fullname">Fullname</label>
          <input type="text" id="Fullname" required placeholder="Enter admin username"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter secure password" />
        </div>
        
        <button type="submit" class="btn-block">Login</button>
        <div id="error-msg" class="error-text"></div>
      </form>
    </div>
  </body>
</html>
