<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Lead Management Software</title>
    <link rel="stylesheet" href="/Frontend/CSS/style.css" />
    <!-- Added Google Sign-In Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body class="login-body">
    <div class="login-card">
      <h2>Lead Management System</h2>
      <p>Sign in to manage your system pipeline</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter admin username"/>
        </div>

        <div class="form-group">
          <label for="fullname">Fullname</label>
          <input type="text" id="Fullname" required placeholder="Enter admin fullname"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter secure password" />
        </div>

        <button type="submit" class="btn-block">Login</button>

        <!-- Divider line for alternative options -->
        <div style="margin: 15px 0; text-align: center; color: #888; font-size: 0.9rem;">
          OR
        </div>

        <!-- Google Sign-In Container -->
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID"
             data-callback="handleGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard" data-width="100%"></div>

        <div id="error-msg" class="error-text"></div>
        
        <!-- Added Link to Register Page -->
        <p style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
          Don't have an account? <a href="/register.html">Sign Up</a>
        </p>
      </form>
    </div>
    <script src="login.js"></script>
  </body>
</html>
